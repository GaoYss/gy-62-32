services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: sh scripts/start-backend.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "19062:5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:8000/api
    depends_on:
      - backend
